<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="auth-container">
        <h3>Account Access</h3>
        <div id="current-user" class="hidden">
          Signed in as <span id="current-user-email"></span> (<span id="current-user-role"></span>)
        </div>

        <div class="auth-grid">
          <form id="register-form">
            <h4>Register</h4>
            <div class="form-group">
              <label for="register-email">Email:</label>
              <input type="email" id="register-email" required placeholder="your-email@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="register-password">Password:</label>
              <input type="password" id="register-password" required minlength="8" />
            </div>
            <div class="form-group">
              <label for="register-role">Role:</label>
              <select id="register-role" required>
                <option value="student">Student</option>
                <option value="mentor">Mentor</option>
              </select>
            </div>
            <button type="submit">Register</button>
          </form>

          <form id="login-form">
            <h4>Login</h4>
            <div class="form-group">
              <label for="login-email">Email:</label>
              <input type="email" id="login-email" required placeholder="your-email@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="login-password">Password:</label>
              <input type="password" id="login-password" required />
            </div>
            <button type="submit">Login</button>
          </form>
        </div>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="signup-hint">Log in as a student to sign up or unregister.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
